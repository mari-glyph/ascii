<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ASCII Animation Tool</title>
  <link rel="stylesheet" href="./styles.css" />
  <!-- gif.js: used for client-side GIF export (CDN). Optional: download and vendor locally. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>ASCII Animation Tool</h2>

      <section class="control-group">
        <h3>Upload</h3>
        <input type="file" id="upload" accept="image/*" />
        <div id="dropZone" class="drop-zone">Drag & Drop image here</div>
        <div id="fileStatus" class="hint" style="margin-top:8px;">No file loaded</div>
      </section>

      <section class="control-group">
        <h3>Render Settings</h3>

        <div class="param-row">
          <label>ASCII Width</label>
          <input type="number" id="asciiWidth" value="200" min="20" max="600">
        </div>

        <div class="param-row">
          <label>Edge</label>
          <select id="edge">
            <option value="none">none</option>
            <option value="sobel">sobel</option>
            <option value="dog">dog</option>
          </select>
        </div>

        <div class="param-row">
          <label>Charset</label>
          <select id="charset">
            <option value="detailed">detailed</option>
            <option value="standard">standard</option>
            <option value="blocks">blocks</option>
            <option value="binary">binary</option>
            <option value="hex">hex</option>
            <option value="manual">manual</option>
          </select>
        </div>
      </section>

      <section class="control-group">
        <h3>Animation (Start / End)</h3>

        <div class="param-row slider-row">
          <label id="brightness-label">Brightness</label>
          <div class="slider-pair">
            <div class="slider-container">
              <input type="range" id="start_brightness" min="-200" max="200" value="0" aria-labelledby="brightness-label" title="Start brightness">
              <span class="slider-value" id="start_brightness_val">0</span>
            </div>
            <div class="slider-container">
              <input type="range" id="end_brightness" min="-200" max="200" value="50" aria-labelledby="brightness-label" title="End brightness">
              <span class="slider-value" id="end_brightness_val">50</span>
            </div>
          </div>
        </div>

        <div class="param-row slider-row">
          <label id="contrast-label">Contrast</label>
          <div class="slider-pair">
            <div class="slider-container">
              <input type="range" id="start_contrast" min="-255" max="255" value="0" aria-labelledby="contrast-label" title="Start contrast">
              <span class="slider-value" id="start_contrast_val">0</span>
            </div>
            <div class="slider-container">
              <input type="range" id="end_contrast" min="-255" max="255" value="50" aria-labelledby="contrast-label" title="End contrast">
              <span class="slider-value" id="end_contrast_val">50</span>
            </div>
          </div>
        </div>

        <div class="param-row">
          <label>Frames</label>
          <input type="number" id="numFrames" min="2" max="300" value="30">
        </div>

        <div class="param-row">
          <label>FPS</label>
          <input type="number" id="fps" min="1" max="60" value="12">
        </div>
      </section>

      <section class="control-group">
        <h3>Display</h3>

        <div class="param-row">
          <label>Mode</label>
          <div class="toggle-group">
            <button type="button" id="modeTerminal" class="toggle-btn active">Terminal</button>
            <button type="button" id="modePrint" class="toggle-btn">Print</button>
          </div>
        </div>

        <div class="param-row">
          <label>Background</label>
          <input type="color" id="bgColor" value="#0a0a0a">
        </div>

        <div class="param-row">
          <label>Foreground</label>
          <input type="color" id="fgColor" value="#00ff00">
        </div>
      </section>

      <section class="control-group">
        <h3>Actions</h3>
        <div class="button-row">
          <button id="generateBtn">Generate</button>
          <button id="playBtn">Play</button>
        </div>
        <div class="button-row">
          <button id="exportGifBtn">Export GIF</button>
          <button id="exportWebmBtn">Export WebM</button>
        </div>
        <div id="progressWrap"><progress id="renderProgress" value="0" max="100"></progress></div>
      </section>

    </aside>

    <main class="main-content">
      <div class="preview-area">
        <canvas id="previewCanvas"></canvas>
        <!-- Dual preview (start/end) -->
        <div id="dualPreview" class="preview-container">
          <div class="preview-panel">
            <div class="preview-label">Start Frame</div>
            <pre id="asciiOutputStart" class="ascii-preview"></pre>
          </div>
          <div class="preview-panel">
            <div class="preview-label">End Frame</div>
            <pre id="asciiOutputEnd" class="ascii-preview"></pre>
          </div>
        </div>
        <!-- Single animation preview -->
        <div id="animationPreview" class="preview-container single hidden">
          <div class="preview-panel full">
            <div class="preview-label">Animation Preview</div>
            <pre id="asciiOutputAnim" class="ascii-preview"></pre>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- App scripts -->
  <script type="module" src="./main.js"></script>
</body>
</html>
