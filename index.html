<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ASCII Animation Tool</title>
  <link rel="stylesheet" href="./styles.css" />
  <!-- gif.js: used for client-side GIF export (CDN). Optional: download and vendor locally. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>ASCII Animation Tool</h2>

      <section class="control-group">
        <h3>Upload</h3>
        <input type="file" id="upload" accept="image/*" />
        <div id="dropZone" class="drop-zone">Drag & Drop image here</div>
        <div id="fileStatus" class="hint" style="margin-top:8px;">No file loaded</div>
      </section>

      <section class="control-group">
        <h3>Render Settings (Start / End)</h3>
        <div class="param-row">
          <label>ASCII Width</label>
          <input type="number" id="start_asciiWidth" value="200" min="20" max="600">
          <input type="number" id="end_asciiWidth" value="200" min="20" max="600">
        </div>

        <div class="param-row">
          <label>Brightness</label>
          <input type="range" id="start_brightness" min="-200" max="200" value="0">
          <input type="range" id="end_brightness" min="-200" max="200" value="50">
        </div>

        <div class="param-row">
          <label>Contrast</label>
          <input type="range" id="start_contrast" min="-255" max="255" value="0">
          <input type="range" id="end_contrast" min="-255" max="255" value="50">
        </div>

        <div class="param-row">
          <label>Zoom (%)</label>
          <input type="range" id="start_zoom" min="20" max="600" value="100">
          <input type="range" id="end_zoom" min="20" max="600" value="130">
        </div>

        <div class="param-row">
          <label>Edge (none/sobel/dog)</label>
          <select id="start_edge">
            <option value="none">none</option>
            <option value="sobel">sobel</option>
            <option value="dog">dog</option>
          </select>
          <select id="end_edge">
            <option value="none">none</option>
            <option value="sobel">sobel</option>
            <option value="dog">dog</option>
          </select>
        </div>

        <div class="param-row">
          <label>Charset</label>
          <select id="start_charset">
            <option value="detailed">detailed</option>
            <option value="standard">standard</option>
            <option value="blocks">blocks</option>
            <option value="binary">binary</option>
            <option value="hex">hex</option>
            <option value="manual">manual</option>
          </select>
          <select id="end_charset">
            <option value="detailed">detailed</option>
            <option value="standard">standard</option>
            <option value="blocks">blocks</option>
            <option value="binary">binary</option>
            <option value="hex">hex</option>
            <option value="manual">manual</option>
          </select>
        </div>

        <div class="param-row small">
          <label>Frames</label>
          <input type="number" id="numFrames" min="2" max="300" value="30">
        </div>

        <div class="param-row small">
          <label>FPS</label>
          <input type="number" id="fps" min="1" max="60" value="12">
        </div>

        <div class="param-row">
          <button id="generateBtn">Generate Preview</button>
          <button id="playBtn">Play/Pause</button>
        </div>

      </section>

      <section class="control-group">
        <h3>Export</h3>
        <div class="param-row">
          <button id="exportGifBtn">Export GIF</button>
          <button id="exportWebmBtn">Export WebM</button>
        </div>
        <p class="hint">WebM can be converted to MP4 using <code>ffmpeg</code> locally (see README).</p>
      </section>

      <section class="control-group">
        <h3>Preview Controls</h3>
        <div id="progressWrap"><progress id="renderProgress" value="0" max="100"></progress></div>
      </section>

    </aside>

    <main class="main-content">
      <div class="preview-area">
        <canvas id="previewCanvas"></canvas>
        <pre id="asciiOutput" aria-hidden="true"></pre>
      </div>
    </main>
  </div>

  <!-- App scripts -->
  <script type="module" src="./main.js"></script>
</body>
</html>
